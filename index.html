<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>Ринат & Дарина</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --cream: #fdf6e3;
    --deep: #1a0a00;
    --rose: #d4607a;
    --rose-light: #f0a0b0;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0d0500;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    gap: 0;
  }

  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 50%, #3d0f00 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 80% 50%, #1a0520 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 100%, #200800 0%, transparent 70%),
      #0d0500;
    z-index: 0;
  }

  .particles { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold-light);
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op); transform: scale(1); }
  }

  .petals { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .petal {
    position: absolute;
    top: -40px;
    font-size: var(--size);
    animation: fall var(--fdur) linear infinite;
    animation-delay: var(--fdelay);
    opacity: 0.7;
  }
  @keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(var(--drift)); opacity: 0; }
  }

  .corner {
    position: absolute;
    width: 8vw; height: 8vw;
    max-width: 100px; max-height: 100px;
    z-index: 5;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 1.5vh; left: 1.5vw; }
  .corner.tr { top: 1.5vh; right: 1.5vw; transform: scaleX(-1); }
  .corner.bl { bottom: 1.5vh; left: 1.5vw; transform: scaleY(-1); }
  .corner.br { bottom: 1.5vh; right: 1.5vw; transform: scale(-1, -1); }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ── HEADER ── */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    flex-shrink: 0;
  }
  .names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.2rem, 5.5vh, 5.5rem);
    color: var(--gold-light);
    text-shadow:
      0 0 40px rgba(201,168,76,0.8),
      0 0 80px rgba(201,168,76,0.4),
      0 2px 4px rgba(0,0,0,0.8);
    line-height: 1;
    opacity: 0;
    animation: slideDown 1s ease 0.3s forwards, glowPulse 3s ease-in-out 1.5s infinite;
  }
  @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 40px rgba(201,168,76,0.8), 0 0 80px rgba(201,168,76,0.4), 0 2px 4px rgba(0,0,0,0.8); }
    50% { text-shadow: 0 0 60px rgba(201,168,76,1), 0 0 120px rgba(201,168,76,0.6), 0 0 200px rgba(212,96,122,0.3), 0 2px 4px rgba(0,0,0,0.8); }
  }
  .ampersand {
    font-family: 'Great Vibes', cursive;
    color: var(--rose-light);
    font-size: 0.85em;
    display: inline-block;
    animation: heartbeat 1.5s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: clamp(0.45rem, 0.9vh, 0.85rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(232, 201, 122, 0.7);
    margin-top: 0.2em;
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
  }

  .divider {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    margin-top: 0.35em;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }
  .divider-line { height: 1px; width: 60px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
  .divider-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 6px var(--gold); }

  /* ── FRAME ── */
  .frame-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    opacity: 0;
    animation: scaleIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .frame-outer {
    position: relative;
    padding: 8px;
    background: linear-gradient(135deg, #c9a84c, #8b6914, #e8c97a, #8b6914, #c9a84c);
    border-radius: 3px;
    box-shadow:
      0 0 0 2px #8b6914,
      0 0 30px rgba(201,168,76,0.5),
      0 0 80px rgba(201,168,76,0.2),
      0 15px 50px rgba(0,0,0,0.8);
    animation: frameGlow 4s ease-in-out infinite;
  }
  @keyframes frameGlow {
    0%, 100% { box-shadow: 0 0 0 2px #8b6914, 0 0 30px rgba(201,168,76,0.5), 0 0 80px rgba(201,168,76,0.2), 0 15px 50px rgba(0,0,0,0.8); }
    50% { box-shadow: 0 0 0 2px #c9a84c, 0 0 50px rgba(201,168,76,0.8), 0 0 120px rgba(201,168,76,0.4), 0 15px 50px rgba(0,0,0,0.8); }
  }

  .frame-inner {
    position: relative;
    padding: 5px;
    background: #0d0500;
    border: 1px solid rgba(201,168,76,0.3);
  }

  .slideshow {
    position: relative;
    /* высота = 55vh, ширина по соотношению 4:3 */
    height: 55vh;
    aspect-ratio: 4/3;
    overflow: hidden;
    background: #1a0a00;
  }

  .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease; }
  .slide.active { opacity: 1; }
  .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(13,5,0,0.1) 0%, transparent 30%, transparent 70%, rgba(13,5,0,0.3) 100%);
    pointer-events: none;
  }

  .dots { display: flex; gap: 7px; justify-content: center; margin-top: 6px; }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(201,168,76,0.3);
    transition: all 0.4s ease;
    cursor: pointer;
  }
  .dot.active { background: var(--gold); box-shadow: 0 0 6px var(--gold); transform: scale(1.3); }

  /* ── FOOTER ── */
  .footer {
    position: relative;
    z-index: 10;
    text-align: center;
    flex-shrink: 0;
    opacity: 0;
    animation: fadeIn 1.5s ease 2s forwards;
  }
  .wish {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.8rem, 1.6vh, 1.5rem);
    color: var(--cream);
    text-shadow: 0 0 20px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.9);
    line-height: 1.4;
    letter-spacing: 0.04em;
  }
  .wish span { color: var(--gold-light); font-style: normal; }
  .kazakh-wish {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.6rem, 1.1vh, 1rem);
    font-weight: 300;
    color: rgba(232, 201, 122, 0.6);
    letter-spacing: 0.12em;
    margin-top: 0.3em;
  }

  .hearts { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .heart {
    position: absolute;
    font-size: var(--hsize);
    animation: floatHeart var(--hdur) ease-in-out infinite;
    animation-delay: var(--hdelay);
    opacity: 0;
    bottom: 15%;
    left: var(--hleft);
  }
  @keyframes floatHeart {
    0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(var(--hrot)); }
    20% { opacity: 0.7; }
    80% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-60vh) scale(1) rotate(calc(var(--hrot) + 30deg)); }
  }

  .side-text {
    position: absolute;
    top: 50%;
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 0.55rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.35);
    z-index: 10;
    white-space: nowrap;
    opacity: 0;
    animation: fadeIn 2s ease 2.5s forwards;
  }
  .side-text.left { left: 12px; transform: translateY(-50%) rotate(-90deg); }
  .side-text.right { right: 12px; transform: translateY(-50%) rotate(90deg); }

  .no-img {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(201,168,76,0.4);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 20px; gap: 12px;
  }
  .no-img .heart-icon { font-size: 3rem; opacity: 0.5; animation: heartbeat 2s ease-in-out infinite; }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 100;
  }

  /* gap between sections */
  .gap-sm { height: 1.2vh; flex-shrink: 0; }
</style>
</head>
<body>
<div class="stage">
  <div class="bg"></div>
  <div class="particles" id="particles"></div>
  <div class="petals" id="petals"></div>
  <div class="hearts" id="hearts"></div>

  <div class="corner tl" style="animation-delay:1.5s">
    <svg viewBox="0 0 100 100" fill="none"><path d="M5 95 L5 5 L95 5" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.8"/><path d="M5 80 L5 5 L80 5" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.4"/><circle cx="5" cy="5" r="4" fill="#c9a84c" opacity="0.9"/><circle cx="5" cy="5" r="2" fill="#e8c97a"/><path d="M20 5 L20 20 M5 20 L20 20" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><circle cx="22" cy="22" r="5" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.5"/><circle cx="22" cy="22" r="2" fill="#c9a84c" opacity="0.4"/></svg>
  </div>
  <div class="corner tr" style="animation-delay:1.7s">
    <svg viewBox="0 0 100 100" fill="none"><path d="M5 95 L5 5 L95 5" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.8"/><path d="M5 80 L5 5 L80 5" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.4"/><circle cx="5" cy="5" r="4" fill="#c9a84c" opacity="0.9"/><circle cx="5" cy="5" r="2" fill="#e8c97a"/><path d="M20 5 L20 20 M5 20 L20 20" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><circle cx="22" cy="22" r="5" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.5"/><circle cx="22" cy="22" r="2" fill="#c9a84c" opacity="0.4"/></svg>
  </div>
  <div class="corner bl" style="animation-delay:1.9s">
    <svg viewBox="0 0 100 100" fill="none"><path d="M5 95 L5 5 L95 5" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.8"/><path d="M5 80 L5 5 L80 5" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.4"/><circle cx="5" cy="5" r="4" fill="#c9a84c" opacity="0.9"/><circle cx="5" cy="5" r="2" fill="#e8c97a"/><path d="M20 5 L20 20 M5 20 L20 20" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><circle cx="22" cy="22" r="5" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.5"/><circle cx="22" cy="22" r="2" fill="#c9a84c" opacity="0.4"/></svg>
  </div>
  <div class="corner br" style="animation-delay:2.1s">
    <svg viewBox="0 0 100 100" fill="none"><path d="M5 95 L5 5 L95 5" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.8"/><path d="M5 80 L5 5 L80 5" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.4"/><circle cx="5" cy="5" r="4" fill="#c9a84c" opacity="0.9"/><circle cx="5" cy="5" r="2" fill="#e8c97a"/><path d="M20 5 L20 20 M5 20 L20 20" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/><circle cx="22" cy="22" r="5" stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.5"/><circle cx="22" cy="22" r="2" fill="#c9a84c" opacity="0.4"/></svg>
  </div>

  <span class="side-text left">✦ Сүйіспеншілік пен бақыт ✦</span>
  <span class="side-text right">✦ Сүйіспеншілік пен бақыт ✦</span>

  <!-- HEADER -->
  <div class="header">
    <div class="names">Ринат <span class="ampersand">♥</span> Дарина</div>
    <div class="tagline">Мәңгілік сүйіспеншілік · Вечная любовь</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-diamond" style="width:4px;height:4px;opacity:0.5;"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
  </div>

  <div class="gap-sm"></div>

  <!-- FRAME -->
  <div class="frame-wrap">
    <div class="frame-outer">
      <div class="frame-inner">
        <div class="slideshow" id="slideshow"></div>
        <div class="dots" id="dots"></div>
      </div>
    </div>
  </div>

  <div class="gap-sm"></div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="wish">Сізге <span>бақыт, сүйіспеншілік</span> және шексіз қуаныш тілейміз</div>
    <div class="kazakh-wish">✦ &nbsp; Жаныңыз жарқын, жолыңыз болсын &nbsp; ✦</div>
  </div>
</div>

<script>
const imageFiles = [
  'img/1.jpg',
  'img/2.jpg',
  'img/3.jpg',
  'img/4.jpg',
];

const slideshowEl = document.getElementById('slideshow');
const dotsEl = document.getElementById('dots');
let current = 0, total = 0, timer;

function buildSlides() {
  const files = imageFiles.filter(Boolean);
  if (!files.length) {
    slideshowEl.innerHTML = `<div class="no-img"><div class="heart-icon">♥</div><div>Поместите фото в папку <strong>img/</strong></div></div>`;
    return;
  }
  total = files.length;
  files.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = src; img.alt = `Фото ${i+1}`;
    slide.appendChild(img);
    slideshowEl.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => { goTo(i); clearInterval(timer); startAuto(); };
    dotsEl.appendChild(dot);
  });
  startAuto();
}

function goTo(n) {
  const slides = slideshowEl.querySelectorAll('.slide');
  const dots = dotsEl.querySelectorAll('.dot');
  if (!slides.length) return;
  slides[current].classList.remove('active');
  dots[current]?.classList.remove('active');
  current = (n + total) % total;
  slides[current].classList.add('active');
  dots[current]?.classList.add('active');
}
function startAuto() { timer = setInterval(() => goTo(current + 1), 4500); }

function createParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*3+1;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${3+Math.random()*5}s;--op:${0.3+Math.random()*0.6};animation-delay:${Math.random()*5}s;`;
    c.appendChild(p);
  }
}
function createPetals() {
  const c = document.getElementById('petals');
  const e = ['🌸','🌺','✿','❀','🌹'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = e[Math.floor(Math.random()*e.length)];
    p.style.cssText = `left:${Math.random()*100}%;--size:${12+Math.random()*16}px;--fdur:${8+Math.random()*12}s;--fdelay:${Math.random()*12}s;--drift:${(Math.random()-0.5)*200}px;`;
    c.appendChild(p);
  }
}
function createHearts() {
  const c = document.getElementById('hearts');
  const h = ['♥','♡','❤','💛','🧡'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = h[Math.floor(Math.random()*h.length)];
    el.style.cssText = `--hsize:${10+Math.random()*18}px;--hdur:${6+Math.random()*8}s;--hdelay:${Math.random()*10}s;--hleft:${5+Math.random()*90}%;--hrot:${(Math.random()-0.5)*40}deg;color:${Math.random()>0.5?'rgba(212,96,122,0.8)':'rgba(201,168,76,0.7)'};`;
    c.appendChild(el);
  }
}

buildSlides();
createParticles();
createPetals();
createHearts();
</script>
</body>
</html>
